<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>FightIQ Pro — AI Performance Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & VARIABLES ===== */
        :root {
            --bg: #0a0a0b;
            --surface: #111114;
            --surface-high: #18181d;
            --surface-hover: #1e1e24;
            --border: #1e1e26;
            --border-high: #2a2a38;
            --border-hover: #3a3a48;
            --accent: #e8ff4a;
            --accent-dim: #c8df2a;
            --accent-glow: rgba(232, 255, 74, 0.25);
            --red: #ff3f3f;
            --blue: #3f8fff;
            --purple: #9b4fff;
            --gold: #f5c842;
            --green: #4ade80;
            --text: #f0f0f0;
            --text-muted: #6b6b80;
            --text-dim: #3a3a4a;
            --sidebar-width: 240px;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition-fast: 0.15s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-base: 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-slow: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            line-height: 1.5;
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* ===== KEYFRAMES ===== */
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes scale-in {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes slide-in-right {
            from {
                opacity: 0;
                transform: translateX(24px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes pulse-accent {
            0%,
            100% {
                box-shadow: 0 0 0 0 var(--accent-glow);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(232, 255, 74, 0);
            }
        }
        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }
        @keyframes draw-bar {
            from {
                width: 0%;
            }
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ===== UTILITY ===== */
        .fade-in-up {
            animation: fade-in-up 0.5s var(--transition-slow) forwards;
            opacity: 0;
        }
        .scale-in {
            animation: scale-in 0.4s var(--transition-slow) forwards;
            opacity: 0;
        }
        .slide-in-right {
            animation: slide-in-right 0.4s var(--transition-slow) forwards;
            opacity: 0;
        }
        .stagger-1 {
            animation-delay: 0.04s;
        }
        .stagger-2 {
            animation-delay: 0.08s;
        }
        .stagger-3 {
            animation-delay: 0.12s;
        }
        .stagger-4 {
            animation-delay: 0.16s;
        }
        .stagger-5 {
            animation-delay: 0.20s;
        }
        .stagger-6 {
            animation-delay: 0.24s;
        }
        .mono {
            font-family: 'Space Mono', 'SF Mono', 'Fira Code', monospace;
        }

        /* ===== LAYOUT ===== */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* ---------- SIDEBAR ---------- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: transform var(--transition-base);
        }
        .sidebar-header {
            padding: 20px 18px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .sidebar-logo svg {
            width: 22px;
            height: 22px;
        }
        .sidebar-brand {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 0.04em;
        }
        .sidebar-sub {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: -2px;
        }
        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            overflow-y: auto;
        }
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 3px;
            position: relative;
            overflow: hidden;
        }
        .sidebar-nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
            transform: scaleY(0);
            transition: transform var(--transition-fast);
        }
        .sidebar-nav-item:hover {
            color: var(--text);
            background: var(--surface-hover);
        }
        .sidebar-nav-item:hover::before {
            transform: scaleY(0.6);
        }
        .sidebar-nav-item.active {
            color: var(--accent);
            background: rgba(232, 255, 74, 0.08);
            border-color: rgba(232, 255, 74, 0.18);
        }
        .sidebar-nav-item.active::before {
            transform: scaleY(1);
        }
        .sidebar-nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .sidebar-nav-badge {
            margin-left: auto;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-accent 2.5s infinite;
        }
        .sidebar-footer {
            padding: 12px 10px;
            border-top: 1px solid var(--border);
        }
        .sidebar-user {
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            background: var(--surface-high);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: rgba(232, 255, 74, 0.15);
            border: 1px solid rgba(232, 255, 74, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .sidebar-user-name {
            font-size: 13.5px;
            font-weight: 600;
        }
        .sidebar-user-role {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
        }
        .sidebar-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .sidebar-stats span:last-child {
            font-family: 'Space Mono';
            color: var(--accent);
            font-weight: 700;
        }

        /* ---------- MOBILE TOGGLE ---------- */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 200;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--surface-high);
            border: 1px solid var(--border);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }
        .mobile-toggle svg {
            width: 20px;
            height: 20px;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
            backdrop-filter: blur(4px);
        }

        /* ---------- MAIN CONTENT ---------- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 28px 36px;
            overflow-y: auto;
            min-height: 100vh;
            transition: margin-left var(--transition-base);
        }
        .main-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 16px;
        }
        .main-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .main-header-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(232, 255, 74, 0.1);
            border: 1px solid rgba(232, 255, 74, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-header-icon svg {
            width: 16px;
            height: 16px;
        }
        .main-header-label {
            font-size: 11px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .main-header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: -0.01em;
            line-height: 1.1;
            margin-top: 4px;
        }
        .main-header-sub {
            color: var(--text-muted);
            margin-top: 4px;
            font-size: 14px;
        }
        .main-header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== COMPONENTS ===== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all var(--transition-fast);
        }
        .card:hover {
            border-color: var(--border-hover);
        }
        .card-hover {
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        .card-hover:hover {
            border-color: var(--border-high);
            background: var(--surface-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .card-title {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title svg {
            width: 14px;
            height: 14px;
        }

        .btn {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13.5px;
            font-weight: 600;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
            justify-content: center;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 14px;
        }
        .btn-primary:hover {
            background: var(--accent-dim);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-ghost {
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
        }
        .btn-ghost:hover {
            border-color: var(--border-high);
            color: var(--text);
            background: var(--surface-hover);
        }
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .btn-icon:hover {
            border-color: var(--border-high);
            color: var(--text);
            background: var(--surface-hover);
        }
        .btn-icon svg {
            width: 16px;
            height: 16px;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            line-height: 1.4;
        }
        .badge-accent {
            background: rgba(232, 255, 74, 0.12);
            color: var(--accent);
            border: 1px solid rgba(232, 255, 74, 0.3);
        }
        .badge-red {
            background: rgba(255, 63, 63, 0.12);
            color: var(--red);
            border: 1px solid rgba(255, 63, 63, 0.3);
        }
        .badge-blue {
            background: rgba(63, 143, 255, 0.12);
            color: var(--blue);
            border: 1px solid rgba(63, 143, 255, 0.3);
        }
        .badge-purple {
            background: rgba(155, 79, 255, 0.12);
            color: var(--purple);
            border: 1px solid rgba(155, 79, 255, 0.3);
        }
        .badge-gold {
            background: rgba(245, 200, 66, 0.12);
            color: var(--gold);
            border: 1px solid rgba(245, 200, 66, 0.3);
        }
        .badge-green {
            background: rgba(74, 222, 128, 0.12);
            color: var(--green);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        .badge-muted {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        input,
        textarea,
        select {
            font-family: inherit;
            background: var(--surface-high);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            transition: all var(--transition-fast);
            width: 100%;
        }
        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 255, 74, 0.1);
        }
        input::placeholder {
            color: var(--text-dim);
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-dim));
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 2s infinite;
        }

        .stat-bar-container {
            margin-bottom: 14px;
        }
        .stat-bar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .stat-bar-label {
            color: var(--text-muted);
        }
        .stat-bar-value {
            font-family: 'Space Mono';
            font-size: 12px;
        }
        .stat-bar-track {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .stat-bar-fill {
            height: 100%;
            border-radius: 3px;
            animation: draw-bar 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
        }
        .stat-bar-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            animation: shimmer 2s infinite;
        }

        .score-ring {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .score-ring-value {
            position: absolute;
            text-align: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 28px;
            line-height: 1;
            color: var(--accent);
        }
        .score-ring-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 2px;
        }

        .insight-card {
            background: var(--surface-high);
            border: 1px solid var(--border);
            border-left: 3px solid;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            animation: fade-in-up 0.4s ease forwards;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            transition: all var(--transition-fast);
        }
        .insight-card:hover {
            background: var(--surface-hover);
            transform: translateX(2px);
        }
        .insight-card svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .insight-card-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 48px;
            text-align: center;
            transition: all var(--transition-base);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .upload-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(232, 255, 74, 0.03), transparent 70%);
            opacity: 0;
            transition: opacity var(--transition-base);
        }
        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(232, 255, 74, 0.04);
        }
        .upload-zone:hover::before,
        .upload-zone.drag-over::before {
            opacity: 1;
        }
        .upload-zone-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: rgba(232, 255, 74, 0.1);
            border: 1px solid rgba(232, 255, 74, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            transition: all var(--transition-base);
        }
        .upload-zone:hover .upload-zone-icon {
            transform: scale(1.05);
        }
        .upload-zone-icon svg {
            width: 32px;
            height: 32px;
        }

        .tab-group {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
            cursor: pointer;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab:hover {
            color: var(--text);
        }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 11px;
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .data-table tr {
            transition: background var(--transition-fast);
        }
        .data-table tr:hover {
            background: var(--surface-hover);
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* ---------- CHAT ---------- */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px);
            min-height: 400px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 8px;
        }
        .chat-message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fade-in-up 0.3s ease forwards;
        }
        .chat-message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .chat-message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            align-self: flex-end;
        }
        .chat-message-avatar.assistant {
            background: rgba(232, 255, 74, 0.15);
            border: 1px solid rgba(232, 255, 74, 0.3);
        }
        .chat-message-avatar.user {
            background: rgba(63, 143, 255, 0.15);
            border: 1px solid rgba(63, 143, 255, 0.3);
        }
        .chat-message-avatar svg {
            width: 14px;

            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .grid-5 {

            // =============================================================
            //  MISE À JOUR DU CONTENU
            // =============================================================
            function switchTab(tabId) {
                // Met à jour la sidebar
                document.querySelectorAll('.sidebar-nav-item').forEach(el => el.classList.remove('active'));
                const navItem = document.querySelector(`.sidebar-nav-item[data-tab="${tabId}"]`);
                if (navItem) navItem.classList.add('active');

                // Met à jour le header
                const data = tabs[tabId];
                document.getElementById('header-label').textContent = data.label;
                document.getElementById('header-title').textContent = data.title;
                document.getElementById('header-sub').textContent = data.sub;
                const iconContainer = document.querySelector('.main-header-icon');
                iconContainer.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${data.icon}</svg>`;

                // Rendu du contenu
                const content = document.getElementById('tab-content');
                const renderFn = renderers[tabId];
                if (renderFn) {
                    content.innerHTML = renderFn();
                    // Réanimer les éléments (les classes d'animation sont déjà dans le HTML)
                }

                // Initialisation spécifique au chat
                if (tabId === 'chat') {
                    initChat();
                }
            }

            // =============================================================
            //  CHAT LOGIC
            // =============================================================
            let chatInitialized = false;

            function initChat() {
                if (chatInitialized) return;
                chatInitialized = true;
                const input = document.getElementById('chat-input');
                const sendBtn = document.getElementById('chat-send-btn');
                const messages = document.getElementById('chat-messages');
                const chips = document.querySelectorAll('.suggestion-chip');

                function addMessage(role, text) {
                    const div = document.createElement('div');
                    div.className = `chat-message ${role}`;
                    const avatar = document.createElement('div');
                    avatar.className = `chat-message-avatar ${role}`;
                    if (role === 'assistant') {
                        avatar.innerHTML =
                            `<svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`;
                    } else {
                        avatar.innerHTML =
                            `<svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
                    }
                    const bubble = document.createElement('div');
                    bubble.className = `chat-message-bubble ${role}`;
                    bubble.textContent = text;
                    div.appendChild(avatar);
                    div.appendChild(bubble);
                    messages.appendChild(div);
                    messages.scrollTop = messages.scrollHeight;
                }

                function simulateResponse(userText) {
                    // Réponses simulées
                    const responses = {
                        'précision': "La précision de Lena Fischer est actuellement de 84%, avec une progression de +12% ce mois-ci. Ses jabs sont particulièrement efficaces (91%).",
                        'stratégie': "Pour un combat en extérieur, privilégie le travail à distance (jab + déplacements) et la gestion du vent. L'endurance respiratoire est clé.",
                        'compare': "Alex (score 89) excelle en puissance (92%) tandis que Diego (score 85) est meilleur en défense (76%). Alex domine au sol, Diego en striking."
                    };
                    let reply = "Je n'ai pas encore assez de données pour répondre précisément. Peux-tu reformuler ?";
                    const lower = userText.toLowerCase();
                    if (lower.includes('lena') || lower.includes('précision')) reply = responses['précision'];
                    else if (lower.includes('stratégie') || lower.includes('extérieur')) reply = responses['stratégie'];
                    else if (lower.includes('compare') || lower.includes('alex') && lower.includes('diego')) reply = responses[
                    'compare'];
                    else if (lower.includes('bonjour') || lower.includes('salut')) reply =
                    "👋 Bonjour ! Je suis FightIQ AI. Que veux-tu analyser aujourd'hui ?";

                    // Ajout d'un indicateur de frappe
                    const typing = document.createElement('div');
                    typing.className = 'chat-typing';
                    typing.innerHTML =
                        '<div class="chat-typing-dot"></div><div class="chat-typing-dot"></div><div class="chat-typing-dot"></div>';
                    messages.appendChild(typing);
                    messages.scrollTop = messages.scrollHeight;

                    setTimeout(() => {
                        typing.remove();
                        addMessage('assistant', reply);
                    }, 1200 + Math.random() * 800);
                }

                function sendMessage() {
                    const text = input.value.trim();
                    if (!text) return;
                    addMessage('user', text);
                    input.value = '';
                    simulateResponse(text);
                }

                sendBtn.addEventListener('click', sendMessage);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
                chips.forEach(chip => {
                    chip.addEventListener('click', () => {
                        const prompt = chip.dataset.prompt;
                        addMessage('user', prompt);
                        simulateResponse(prompt);
                    });
                });
            }

            // =============================================================
            //  NOTIFICATIONS
            // =============================================================
            function showNotification(message, type = 'accent') {
                const container = document.getElementById('notif-container');
                const notif = document.createElement('div');
                notif.className = 'notification fade-in-up';
                notif.innerHTML = `
              <span class="notification-dot" style="color:var(--${type});background:var(--${type});"></span>
              <span>${message}</span>
              <span class="notification-close" onclick="this.parentElement.remove()">✕</span>
            `;
                container.appendChild(notif);
                setTimeout(() => {
                    if (notif.parentElement) notif.remove();
                }, 5000);
            }

            // =============================================================
            //  EVENTS
            // =============================================================
            // Navigation sidebar
            document.querySelectorAll('.sidebar-nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    switchTab(tab);
                    // Fermer la sidebar sur mobile
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('sidebar-overlay').classList.remove('open');
                    document.getElementById('mobile-toggle').setAttribute('aria-expanded', 'false');
                });
            });

            // Mobile toggle
            document.getElementById('mobile-toggle').addEventListener('click', function() {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                const isOpen = sidebar.classList.toggle('open');
                overlay.classList.toggle('open');
                this.setAttribute('aria-expanded', isOpen);
            });
            document.getElementById('sidebar-overlay').addEventListener('click', function() {
                document.getElementById('sidebar').classList.remove('open');
                this.classList.remove('open');
                document.getElementById('mobile-toggle').setAttribute('aria-expanded', 'false');
            });

            // Notification test
            document.getElementById('notif-test-btn').addEventListener('click', () => {
                showNotification('🔔 Nouvelle analyse disponible pour Lena Fischer', 'accent');
                setTimeout(() => showNotification('⚠️ Fatigue détectée chez James Okonkwo', 'red'), 1200);
            });

            // Export
            document.getElementById('export-btn').addEventListener('click', () => {
                showNotification('📊 Export CSV lancé avec succès', 'green');
            });

            // =============================================================
            //  INITIALISATION
            // =============================================================
            // Charger le dashboard par défaut
            switchTab('dashboard');

        }); // fin DOMContentLoaded
    </script>
</body>
</html>
