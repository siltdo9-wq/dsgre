<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement confirmé — VIP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding: 24px;
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: #1a2a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 28px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      color: #888;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .countdown {
      color: #555;
      font-size: 13px;
      margin-bottom: 28px;
    }

    .countdown span {
      color: #5865F2;
      font-weight: 700;
    }

    .btn {
      display: block;
      width: 100%;
      background: #5865F2;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #4752c4;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: #222;
      border-radius: 100px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #5865F2;
      border-radius: 100px;
      width: 100%;
      transform-origin: left;
      animation: drain 5s linear forwards;
    }

    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">✅</div>

    <h1>Paiement confirmé !</h1>

    <p>Merci pour ton achat. Tu vas être redirigé vers le Discord VIP dans quelques secondes.</p>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <div class="countdown">Redirection dans <span id="timer">5</span> secondes…</div>

    <a href="https://discord.gg/NkD9bBArx" class="btn">Accéder au Discord maintenant →</a>
  </div>

  <script>
    const DISCORD = 'https://discord.gg/NkD9bBArx';
    let seconds = 5;
    const el = document.getElementById('timer');

    const interval = setInterval(() => {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = DISCORD;
      }
    }, 1000);
  </script>

</body>
</html>
